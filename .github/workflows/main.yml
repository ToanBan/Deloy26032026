name: Deploy to Hutech Server

on:
  push:
    branches: [ "master", "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Triển khai lên DevOps Classroom
        run: |
          # 1. KHÔNG để :latest ở biến REPO
          REPO="letoanban/spring-app-hutech"
          
          # 2. KIỂM TRA LẠI SLOT: Hình cuối bạn gửi là S2, hình đầu là S7.
          # Nếu Dashboard hiện SLOT S2 -> để SLOT="2"
          # Nếu Dashboard hiện SLOT S7 -> để SLOT="7"
          SLOT="2" 
          
          CONTAINER_PORT=80
          
          # Lệnh curl chuẩn (đã xóa bớt tag thừa trong repo)
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=$SLOT&container_port=$CONTAINER_PORT")
          
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Webhook HTTP: $CODE"
          
          if [ "$CODE" -eq 200 ] || [ "$CODE" -eq 201 ]; then
            echo "Deploy thành công rực rỡ!"
            echo "::group::Phản hồi từ Server"
            echo "$BODY"
            echo "::endgroup::"
          else
            echo "Deploy thất bại với mã lỗi $CODE"
            echo "Chi tiết: $BODY"
            exit 1
          fi
